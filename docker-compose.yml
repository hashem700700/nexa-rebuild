version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erp_dev
      POSTGRES_PASSWORD: erp_dev_pass
      POSTGRES_DB: erp_core
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
